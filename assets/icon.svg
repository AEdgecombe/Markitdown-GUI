<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- MarkItDown GUI icon — "Thermal Glow": deep blue tile, purple→pink "M",
       incandescent amber download arrow. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12183a"/>
      <stop offset="1" stop-color="#0a0d1c"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a14dff"/>
      <stop offset="1" stop-color="#ff4d9d"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a3d"/>
      <stop offset="1" stop-color="#ffb454"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="none"
        stroke="#3a3f9e" stroke-width="2"/>

  <!-- Stylized "M" with a heat-map gradient -->
  <path d="M 56 184 L 56 84 L 92 84 L 128 132 L 164 84 L 200 84 L 200 184 L 170 184 L 170 124 L 138 166 L 118 166 L 86 124 L 86 184 Z"
        fill="url(#heat)"/>

  <!-- Download arrow, incandescent amber -->
  <g fill="url(#arrow)">
    <rect x="118" y="150" width="20" height="40" rx="4"/>
    <path d="M 100 182 L 156 182 L 128 214 Z"/>
  </g>
</svg>
