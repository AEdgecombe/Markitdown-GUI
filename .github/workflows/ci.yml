name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Tkinter + Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install the package and dev/test deps
        run: |
          python -m pip install --upgrade pip
          # Install markitdown[all] so the end-to-end tests actually run.
          pip install "markitdown[all]"
          pip install pytest Pillow tkinterdnd2
          pip install -e . --no-deps

      - name: Render the icon (rasterizer or Pillow fallback)
        run: python scripts/generate_icon.py /tmp/icon.png

      - name: Run tests headlessly under Xvfb
        run: xvfb-run -a pytest -v
